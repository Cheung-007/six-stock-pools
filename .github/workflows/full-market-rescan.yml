name: Full Market Rescan

on:
  schedule:
    - cron: "10 7 */3 * *"
  workflow_dispatch:

permissions:
  contents: read

jobs:
  rescan:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: "22"

      - name: Run full market scanner
        run: node scripts/full-market-rescan.mjs
