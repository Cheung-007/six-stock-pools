<!doctype html>
<html lang="zh-CN">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
  <title>六仓股池</title>
  <style>
    :root {
      --bg: #f7f8f5;
      --surface: #ffffff;
      --surface-2: #f0f3ed;
      --ink: #17201a;
      --muted: #667067;
      --line: #dfe5dc;
      --green: #2f7d52;
      --green-2: #e5f2e9;
      --gold: #a56a1f;
      --gold-2: #f8eedf;
      --red: #bd4b45;
      --red-2: #fae9e7;
      --blue: #306f95;
      --blue-2: #e4f0f5;
      --shadow: 0 14px 40px rgba(25, 36, 28, .10);
      --radius: 8px;
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", "PingFang SC", "Hiragino Sans GB", "Microsoft YaHei", Arial, sans-serif;
      color: var(--ink);
      background: var(--bg);
    }

    * { box-sizing: border-box; }
    html { scroll-behavior: smooth; }
    body {
      margin: 0;
      min-height: 100vh;
      background: #f4f5f8;
      letter-spacing: 0;
    }

    button, input, select, textarea {
      font: inherit;
      color: inherit;
    }

    button {
      border: 0;
      cursor: pointer;
      -webkit-tap-highlight-color: transparent;
    }

    .app {
      width: min(1040px, 100%);
      margin: 0 auto;
      padding: 14px 12px calc(96px + env(safe-area-inset-bottom));
    }

    .topbar {
      position: sticky;
      top: 0;
      z-index: 20;
      margin: -14px -12px 10px;
      padding: calc(12px + env(safe-area-inset-top)) 12px 10px;
      background: rgba(247, 248, 245, .92);
      backdrop-filter: blur(16px);
      border-bottom: 1px solid rgba(223, 229, 220, .82);
    }

    .brand-row {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 10px;
      margin-bottom: 10px;
    }

    .brand {
      display: flex;
      align-items: center;
      gap: 10px;
      min-width: 0;
    }

    .mark {
      width: 38px;
      height: 38px;
      display: grid;
      place-items: center;
      border-radius: 8px;
      background: #17201a;
      color: #f7f8f5;
      flex: 0 0 auto;
      box-shadow: 0 10px 24px rgba(23, 32, 26, .16);
    }

    .brand h1 {
      font-size: 20px;
      line-height: 1.1;
      margin: 0;
      font-weight: 760;
    }

    .brand p {
      margin: 3px 0 0;
      color: var(--muted);
      font-size: 12px;
      line-height: 1.25;
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
      max-width: 54vw;
    }

    .icon-row {
      display: flex;
      align-items: center;
      gap: 7px;
      flex: 0 0 auto;
    }

    .icon-btn {
      width: 38px;
      height: 38px;
      border-radius: 8px;
      background: var(--surface);
      border: 1px solid var(--line);
      display: grid;
      place-items: center;
      color: var(--ink);
      box-shadow: 0 6px 18px rgba(25, 36, 28, .07);
    }

    .primary:active, .tab:active {
      transform: translateY(1px);
    }

    .controls {
      display: grid;
      grid-template-columns: 1fr auto;
      gap: 8px;
      align-items: center;
    }

    .search-wrap {
      position: relative;
      min-width: 0;
    }

    .search {
      height: 42px;
      width: 100%;
      border: 1px solid var(--line);
      border-radius: 8px;
      background: var(--surface);
      padding: 0 12px;
      outline: none;
      box-shadow: 0 6px 18px rgba(25, 36, 28, .05);
    }

    .search:focus {
      border-color: rgba(47, 125, 82, .52);
      box-shadow: 0 0 0 3px rgba(47, 125, 82, .12);
    }

    .suggestions {
      position: absolute;
      left: 0;
      right: 0;
      top: calc(100% + 6px);
      z-index: 30;
      display: none;
      max-height: 310px;
      overflow: auto;
      background: var(--surface);
      border: 1px solid var(--line);
      border-radius: 8px;
      box-shadow: var(--shadow);
    }

    .suggestions.open { display: block; }

    .suggestion {
      width: 100%;
      padding: 11px 12px;
      background: var(--surface);
      display: grid;
      grid-template-columns: 1fr auto;
      gap: 8px;
      align-items: center;
      text-align: left;
      border-bottom: 1px solid rgba(223, 229, 220, .72);
    }

    .suggestion:last-child { border-bottom: 0; }

    .suggestion strong {
      display: block;
      font-size: 14px;
      line-height: 1.2;
    }

    .suggestion span {
      display: block;
      margin-top: 3px;
      color: var(--muted);
      font-size: 12px;
    }

    .suggestion em {
      font-style: normal;
      color: var(--green);
      font-size: 12px;
      font-weight: 720;
    }

    .primary {
      height: 42px;
      padding: 0 14px;
      border-radius: 8px;
      background: var(--green);
      color: #fff;
      font-weight: 720;
      display: inline-flex;
      align-items: center;
      gap: 7px;
      box-shadow: 0 10px 22px rgba(47, 125, 82, .24);
      white-space: nowrap;
    }

    .tabs {
      display: grid;
      grid-template-columns: repeat(3, minmax(0, 1fr));
      gap: 8px;
      margin: 12px 0 8px;
    }

    .tab {
      min-height: 56px;
      border-radius: 8px;
      padding: 8px;
      background: rgba(255, 255, 255, .72);
      border: 1px solid var(--line);
      text-align: left;
      display: grid;
      gap: 4px;
    }

    .tab strong {
      font-size: 13px;
      line-height: 1.1;
    }

    .tab span {
      font-size: 11px;
      color: var(--muted);
      line-height: 1.1;
    }

    .tab.active {
      background: #17201a;
      color: #fff;
      border-color: #17201a;
      box-shadow: var(--shadow);
    }

    .tab.active span { color: rgba(255, 255, 255, .72); }

    .pool-head {
      display: flex;
      align-items: flex-start;
      justify-content: space-between;
      gap: 12px;
      margin: 16px 2px 10px;
    }

    .pool-head h2 {
      margin: 0;
      font-size: 23px;
      line-height: 1.08;
    }

    .pool-head p {
      margin: 5px 0 0;
      color: var(--muted);
      font-size: 13px;
      line-height: 1.35;
    }

    .chips {
      display: flex;
      gap: 8px;
      overflow-x: auto;
      padding: 2px 2px 10px;
      scrollbar-width: none;
    }

    .chips::-webkit-scrollbar { display: none; }

    .chip {
      border-radius: 999px;
      padding: 8px 11px;
      background: rgba(255, 255, 255, .76);
      color: var(--muted);
      border: 1px solid var(--line);
      font-size: 12px;
      white-space: nowrap;
    }

    .chip.active {
      background: var(--green-2);
      color: var(--green);
      border-color: rgba(47, 125, 82, .25);
      font-weight: 720;
    }

    .list {
      display: grid;
      gap: 0;
      overflow: hidden;
      background: var(--surface);
      border: 1px solid rgba(223, 229, 220, .78);
      border-radius: 8px;
      box-shadow: 0 10px 30px rgba(25, 36, 28, .06);
    }

    .list-head {
      display: grid;
      grid-template-columns: minmax(0, 1fr) 52px 68px 78px;
      gap: 8px;
      align-items: center;
      padding: 8px 12px;
      color: var(--muted);
      font-size: 11px;
      border-bottom: 1px solid rgba(223, 229, 220, .78);
    }

    .list-head span:nth-child(n+2) {
      text-align: right;
    }

    .card {
      background: var(--surface);
      border: 0;
      border-bottom: 1px solid rgba(223, 229, 220, .78);
      border-radius: 0;
      padding: 12px;
      box-shadow: none;
    }

    .card:last-child {
      border-bottom: 0;
    }

    .card-top {
      display: grid;
      grid-template-columns: minmax(0, 1fr) 52px 68px 78px;
      gap: 8px;
      align-items: center;
    }

    .name-line {
      display: flex;
      align-items: center;
      gap: 8px;
      min-width: 0;
      margin-bottom: 5px;
    }

    .name-line h3 {
      margin: 0;
      font-size: 16px;
      line-height: 1.15;
      min-width: 0;
      overflow: hidden;
      display: -webkit-box;
      -webkit-line-clamp: 2;
      -webkit-box-orient: vertical;
    }

    .quote-title {
      color: inherit;
      text-decoration: none;
    }

    .quote-title:active {
      color: var(--green);
    }

    .grade {
      flex: 0 0 auto;
      min-width: 20px;
      height: 20px;
      padding: 0 4px;
      border-radius: 4px;
      background: var(--red);
      color: #fff;
      display: inline-flex;
      align-items: center;
      justify-content: center;
      font-size: 11px;
      font-weight: 760;
    }

    .market-badge {
      display: inline-flex;
      align-items: center;
      justify-content: center;
      min-width: 18px;
      height: 18px;
      padding: 0 3px;
      border-radius: 4px;
      background: var(--red);
      color: #fff;
      font-size: 10px;
      font-weight: 760;
      line-height: 1;
    }

    .meta {
      display: flex;
      align-items: center;
      gap: 6px;
      flex-wrap: wrap;
      color: var(--muted);
      font-size: 12px;
      line-height: 1.3;
    }

    .spark {
      width: 52px;
      height: 34px;
      color: var(--muted);
      opacity: .95;
    }

    .spark svg {
      width: 52px;
      height: 34px;
      stroke-width: 2;
    }

    .spark path.area {
      stroke: none;
      opacity: .12;
    }

    .price-cell {
      text-align: right;
      font-variant-numeric: tabular-nums;
    }

    .price-cell b {
      display: block;
      font-size: 18px;
      line-height: 1.1;
      font-weight: 760;
    }

    .price-cell span {
      display: block;
      margin-top: 3px;
      color: var(--muted);
      font-size: 10px;
      line-height: 1.2;
    }

    .cost {
      text-align: right;
      font-variant-numeric: tabular-nums;
    }

    .cost b {
      display: inline-flex;
      align-items: center;
      justify-content: center;
      min-width: 74px;
      height: 30px;
      padding: 0 8px;
      border-radius: 7px;
      color: #fff;
      background: var(--muted);
      font-size: 15px;
      line-height: 1.1;
      font-weight: 760;
    }

    .cost span {
      color: var(--muted);
      font-size: 11px;
      line-height: 1.2;
    }

    .quote-up { color: var(--red); }
    .quote-down { color: var(--green); }
    .quote-flat { color: var(--muted); }
    .quote-up-bg { background: var(--red) !important; }
    .quote-down-bg { background: #24a876 !important; }
    .quote-flat-bg { background: #8b948c !important; }

    .note {
      margin: 8px 0 0;
      color: #344139;
      font-size: 12px;
      line-height: 1.5;
    }

    .entry-line {
      width: fit-content;
      margin-top: 8px;
      padding: 5px 8px;
      border-radius: 8px;
      background: rgba(240, 243, 237, .82);
      color: var(--muted);
      font-size: 11px;
      line-height: 1.35;
      font-variant-numeric: tabular-nums;
    }

    .entry-line.entry-up { color: var(--red); background: var(--red-2); }
    .entry-line.entry-down { color: var(--green); background: var(--green-2); }

    .tags {
      display: flex;
      flex-wrap: wrap;
      gap: 7px;
      margin-top: 8px;
    }

    .quote-action {
      display: inline-flex;
      align-items: center;
      gap: 5px;
      width: fit-content;
      min-height: 32px;
      margin-top: 10px;
      padding: 0 10px;
      border-radius: 8px;
      background: var(--green-2);
      color: var(--green);
      text-decoration: none;
      font-size: 12px;
      font-weight: 720;
    }

    .quote-action svg {
      width: 14px;
      height: 14px;
      stroke: currentColor;
      stroke-width: 2.2;
      fill: none;
      stroke-linecap: round;
      stroke-linejoin: round;
      flex: 0 0 auto;
    }

    .tag {
      border-radius: 999px;
      padding: 5px 8px;
      font-size: 11px;
      line-height: 1;
      color: var(--blue);
      background: var(--blue-2);
      white-space: nowrap;
    }

    .tag.warn {
      color: var(--gold);
      background: var(--gold-2);
    }

    .tag.danger {
      color: var(--red);
      background: var(--red-2);
    }

    .card-actions {
      display: flex;
      justify-content: flex-end;
      gap: 8px;
      margin-top: 8px;
    }

    .text-btn {
      height: 34px;
      padding: 0 10px;
      border-radius: 8px;
      background: var(--surface-2);
      color: var(--ink);
      font-weight: 680;
      font-size: 12px;
    }

    .text-btn.delete {
      color: var(--red);
      background: var(--red-2);
    }

    .empty {
      border: 1px dashed #c8d1c6;
      border-radius: 8px;
      padding: 18px;
      background: rgba(255, 255, 255, .62);
      color: var(--muted);
      text-align: center;
      line-height: 1.5;
    }

    .rules {
      margin-top: 18px;
      background: rgba(255, 255, 255, .70);
      border: 1px solid var(--line);
      border-radius: 8px;
      padding: 14px;
    }

    .rules h2 {
      font-size: 18px;
      margin: 0 0 10px;
    }

    .rule-grid {
      display: grid;
      gap: 8px;
    }

    .rule-row {
      display: grid;
      grid-template-columns: 76px 1fr;
      gap: 10px;
      font-size: 13px;
      line-height: 1.45;
      padding: 8px 0;
      border-top: 1px solid rgba(223, 229, 220, .72);
    }

    .rule-row:first-child { border-top: 0; padding-top: 0; }
    .rule-row b { color: var(--ink); }
    .rule-row span { color: var(--muted); }

    .drawer {
      position: fixed;
      inset: 0;
      z-index: 50;
      display: none;
    }

    .drawer.open { display: block; }

    .shade {
      position: absolute;
      inset: 0;
      background: rgba(23, 32, 26, .38);
    }

    .panel {
      position: absolute;
      left: 0;
      right: 0;
      bottom: 0;
      max-height: 88vh;
      overflow: auto;
      padding: 16px 12px calc(18px + env(safe-area-inset-bottom));
      background: var(--bg);
      border-radius: 8px 8px 0 0;
      box-shadow: 0 -24px 70px rgba(23, 32, 26, .24);
    }

    .panel-head {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 12px;
      margin-bottom: 12px;
    }

    .panel-head h2 {
      margin: 0;
      font-size: 20px;
      line-height: 1.1;
    }

    form {
      display: grid;
      gap: 10px;
    }

    .field {
      display: grid;
      gap: 6px;
    }

    .field label {
      color: var(--muted);
      font-size: 12px;
      font-weight: 680;
    }

    .field input, .field select, .field textarea {
      width: 100%;
      border: 1px solid var(--line);
      background: var(--surface);
      border-radius: 8px;
      outline: none;
      padding: 10px;
      min-height: 42px;
    }

    .field textarea {
      resize: vertical;
      min-height: 82px;
      line-height: 1.45;
    }

    .form-grid {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 10px;
    }

    .form-actions {
      position: sticky;
      bottom: calc(-18px - env(safe-area-inset-bottom));
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 10px;
      padding: 10px 0 0;
      background: linear-gradient(180deg, rgba(247, 248, 245, 0), var(--bg) 24%);
    }

    .secondary {
      height: 44px;
      border-radius: 8px;
      background: var(--surface);
      border: 1px solid var(--line);
      font-weight: 720;
    }

    .toast {
      position: fixed;
      left: 50%;
      bottom: calc(18px + env(safe-area-inset-bottom));
      transform: translateX(-50%) translateY(24px);
      z-index: 80;
      min-width: min(92vw, 320px);
      padding: 11px 14px;
      border-radius: 8px;
      background: #17201a;
      color: #fff;
      box-shadow: var(--shadow);
      opacity: 0;
      pointer-events: none;
      transition: .2s ease;
      text-align: center;
      font-size: 13px;
    }

    .toast.show {
      opacity: 1;
      transform: translateX(-50%) translateY(0);
    }

    .desktop-grid {
      display: grid;
      gap: 12px;
    }

    svg {
      width: 19px;
      height: 19px;
      display: block;
      stroke: currentColor;
      stroke-width: 2;
      stroke-linecap: round;
      stroke-linejoin: round;
      fill: none;
    }

    .mark svg {
      width: 22px;
      height: 22px;
    }

    @media (min-width: 720px) {
      .app {
        padding: 20px 20px 96px;
      }

      .topbar {
        margin: -20px -20px 12px;
        padding: 18px 20px 12px;
      }

      .desktop-grid {
        grid-template-columns: 300px 1fr;
        align-items: start;
      }

      .side {
        position: sticky;
        top: 112px;
      }

      .tabs {
        grid-template-columns: 1fr;
      }

      .list {
        grid-template-columns: 1fr;
      }

      .panel {
        width: min(560px, calc(100% - 32px));
        left: auto;
        right: 16px;
        bottom: 16px;
        border-radius: 8px;
      }
    }

    @media (max-width: 380px) {
      .brand h1 { font-size: 18px; }
      .brand p { max-width: 46vw; }
      .primary { padding: 0 10px; }
      .tabs { gap: 6px; }
      .tab { padding: 7px; }
      .tab strong { font-size: 12px; }
      .list-head,
      .card-top {
        grid-template-columns: minmax(0, 1fr) 46px 62px 70px;
        gap: 6px;
      }
      .spark,
      .spark svg {
        width: 46px;
      }
      .price-cell b { font-size: 16px; }
      .cost b {
        min-width: 66px;
        padding: 0 6px;
        font-size: 13px;
      }
    }
  </style>
</head>
<body>
  <div class="app">
    <header class="topbar">
      <div class="brand-row">
        <div class="brand">
          <div class="mark" aria-hidden="true">
            <svg viewBox="0 0 24 24"><path d="M4 17l5-5 4 4 7-9"/><path d="M15 7h5v5"/></svg>
          </div>
          <div>
            <h1>六仓股池</h1>
            <p id="saveInfo">云端同步</p>
          </div>
        </div>
      </div>
      <div class="controls">
        <div class="search-wrap">
          <input class="search" id="searchInput" type="search" placeholder="搜索或联网添加股票 / ETF" autocomplete="off">
          <div class="suggestions" id="suggestions"></div>
        </div>
        <button class="primary" id="addBtn" type="button">
          <svg viewBox="0 0 24 24"><circle cx="11" cy="11" r="7"/><path d="M16.5 16.5L21 21"/></svg>
          搜索
        </button>
      </div>
    </header>

    <main class="desktop-grid">
      <aside class="side">
        <nav class="tabs" id="tabs" aria-label="票仓"></nav>
        <section class="rules">
          <h2>仓位规则</h2>
          <div class="rule-grid">
            <div class="rule-row"><b>投机</b><span>1-3 个交易日，触发才做，不全买。</span></div>
            <div class="rule-row"><b>短线</b><span>1-2 周，等趋势延续和回踩承接。</span></div>
            <div class="rule-row"><b>长线</b><span>2 个月以上，按财报、估值和配置筛。</span></div>
          </div>
        </section>
      </aside>

      <section>
        <div class="pool-head">
          <div>
            <h2 id="poolTitle">投机个股</h2>
            <p id="poolDesc">1-3 个交易日</p>
          </div>
        </div>
        <div class="list" id="list"></div>
      </section>
    </main>
  </div>

  <div class="drawer" id="drawer" aria-hidden="true">
    <div class="shade" id="shade"></div>
    <section class="panel" role="dialog" aria-modal="true" aria-labelledby="formTitle">
      <div class="panel-head">
        <h2 id="formTitle">新增标的</h2>
        <button class="icon-btn" id="closeDrawer" type="button" title="关闭">
          <svg viewBox="0 0 24 24"><path d="M18 6L6 18"/><path d="M6 6l12 12"/></svg>
        </button>
      </div>
      <form id="stockForm">
        <input type="hidden" id="stockId">
        <div class="field">
          <label for="pool">票仓</label>
          <select id="pool" required></select>
        </div>
        <div class="form-grid">
          <div class="field">
            <label for="code">代码</label>
            <input id="code" required placeholder="002185">
          </div>
          <div class="field">
            <label for="name">名称</label>
            <input id="name" required placeholder="华天科技">
          </div>
        </div>
        <div class="form-grid">
          <div class="field">
            <label for="grade">分层</label>
            <input id="grade" placeholder="A">
          </div>
          <div class="field">
            <label for="status">状态</label>
            <select id="status">
              <option value="可操作">可操作</option>
              <option value="观察">观察</option>
              <option value="待筛选">待筛选</option>
              <option value="暂不进入">暂不进入</option>
            </select>
          </div>
        </div>
        <div class="form-grid">
          <div class="field">

    ];

    let state = {
      activePool: "spec_stock",
      activeStatus: "全部",
      query: "",
      suggestions: [],
      quoteUpdatedAt: "",
      cloudStatus: "loading",
      cloudSavedAt: "",
      items: loadItems()
    };

    const $ = (id) => document.getElementById(id);
    const tabsEl = $("tabs");
    const listEl = $("list");
    const fileInput = $("fileInput");
    const suggestionsEl = $("suggestions");
    let suggestTimer = null;
    let codeTimer = null;
    let quoteTimer = null;

    init();

    async function init() {
      renderPoolOptions();
      bindEvents();
      render();
      await loadCloudItems({ seedIfEmpty: true });
      refreshAllQuotes();
      quoteTimer = setInterval(refreshAllQuotes, 60000);
    }

    function bindEvents() {
      $("searchInput").addEventListener("input", (event) => {
        state.query = event.target.value.trim();
        scheduleSuggest(state.query);
        render();
      });
      $("searchInput").addEventListener("focus", () => renderSuggestions());
      document.addEventListener("click", (event) => {
        if (!event.target.closest(".search-wrap")) closeSuggestions();
      });
      document.addEventListener("visibilitychange", () => {
        if (!document.hidden) refreshAllQuotes();
      });
      window.addEventListener("focus", () => refreshAllQuotes());
      window.addEventListener("pageshow", () => refreshAllQuotes());
      listEl.addEventListener("click", handleQuoteLinkClick);
      $("addBtn").addEventListener("click", focusSearch);
      $("closeDrawer").addEventListener("click", closeForm);
      $("shade").addEventListener("click", closeForm);
      $("cancelBtn").addEventListener("click", closeForm);
      $("stockForm").addEventListener("submit", saveForm);
      $("code").addEventListener("input", () => scheduleCodeAutofill());
      $("code").addEventListener("blur", () => autofillByCode());
      fileInput.addEventListener("change", importData);
    }

    function render() {
      renderTabs();
      renderSummary();
      renderList();
      renderSuggestions();
      updateSaveInfo();
    }

    function renderTabs() {
      tabsEl.innerHTML = POOLS.map((pool) => {
        const count = state.items.filter((item) => item.pool === pool.id).length;
        return `
          <button class="tab ${pool.id === state.activePool ? "active" : ""}" type="button" data-pool="${pool.id}">
            <strong>${pool.title}</strong>
            <span>${pool.cycle} · ${count} 个</span>
          </button>
        `;
      }).join("");

      tabsEl.querySelectorAll("button").forEach((button) => {
        button.addEventListener("click", () => {
          state.activePool = button.dataset.pool;
          state.activeStatus = "全部";
          render();
        });
      });
    }

    function renderChips() {
      state.activeStatus = "全部";
    }

    function focusSearch() {
      $("searchInput").focus();
      refreshAllQuotes();
      if (state.query.length >= 2) {
        scheduleSuggest(state.query);
      }
    }

    async function handleQuoteLinkClick(event) {
      const link = event.target.closest(".quote-action, .quote-title");
      if (!link) return;
      refreshAllQuotes();
    }

    function renderSummary() {
      const pool = getPool(state.activePool);
      $("poolTitle").textContent = pool.title;
      $("poolDesc").textContent = `${pool.cycle} · ${pool.desc}`;
    }

    function renderList() {
      const items = filteredItems();
      if (!items.length) {
        listEl.innerHTML = `<div class="empty">当前票仓暂无匹配标的</div>`;
        return;
      }

      listEl.innerHTML = `
        <div class="list-head">
          <span>名称代码</span>
          <span>走势</span>
          <span>最新价</span>
          <span>涨跌幅</span>
        </div>
        ${items.map((item) => {
        const price = item.price || "--";
        const quoteClass = quoteTone(item);
        const pct = item.changePct || "--";
        const pctBg = quoteBg(item);
        const statusClass = item.status === "暂不进入" ? "danger" : item.status === "观察" ? "warn" : "";
        const tags = [item.status, ...(item.tags || [])].filter(Boolean);
        const quoteUrl = marketQuoteUrl(item);

          <article class="card">

                  <h3><a class="quote-title" href="${quoteUrl}" target="_blank" rel="noopener noreferrer">${escapeHtml(item.name)}</a></h3>
                </div>
                <div class="meta">
                  <span>${marketBadge(item.symbol)}</span>
                  <span>${escapeHtml(displayCode(item))}</span>
                </div>
              </div>
              <div class="spark ${quoteClass}" aria-hidden="true">
                ${sparkline(item)}
              </div>
              <div class="price-cell ${quoteClass}">
                <b>${escapeHtml(price)}</b>
                <span>${escapeHtml(item.quoteTime ? item.quoteTime.slice(11, 16) : "实时")}</span>
              </div>
              <div class="cost">
                <b class="${pctBg}">${escapeHtml(pct)}</b>
              </div>
            </div>
            <p class="note">${escapeHtml(item.note || "")}</p>
            ${entry ? `<div class="entry-line ${entry.tone}">${escapeHtml(entry.text)}</div>` : ""}
            <div class="tags">
              ${tags.map((tag, index) => `<span class="tag ${index === 0 ? statusClass : ""}">${escapeHtml(tag)}</span>`).join("")}
            </div>
            <a class="quote-action" href="${quoteUrl}" target="_blank" rel="noopener noreferrer">
              <svg viewBox="0 0 24 24"><path d="M4 17l5-5 4 4 7-9"/><path d="M15 7h5v5"/></svg>
              行情 / K线
            </a>
          </article>
        `;
      }).join("")}
      `;
    }

    function renderSuggestions() {
      if (!state.query || state.query.length < 2 || !state.suggestions.length) {
        closeSuggestions();
        return;
      }

      suggestionsEl.innerHTML = state.suggestions.map((stock) => `
        <button class="suggestion" type="button" data-symbol="${escapeHtml(stock.symbol)}">
          <span>
            <strong>${escapeHtml(stock.name)}</strong>
            <span>${escapeHtml(stock.code)} · ${escapeHtml(stock.typeLabel)}</span>
          </span>
          <em>添加</em>
        </button>
      `).join("");

      suggestionsEl.classList.add("open");
      suggestionsEl.querySelectorAll("[data-symbol]").forEach((button) => {
        button.addEventListener("click", () => {
          const stock = state.suggestions.find((item) => item.symbol === button.dataset.symbol);
          if (stock) selectSuggestion(stock);
        });
      });
    }

    function closeSuggestions() {
      suggestionsEl.classList.remove("open");
    }

    function filteredItems() {
      const query = state.query.toLowerCase();
      return state.items
        .filter((item) => item.pool === state.activePool)
        .filter((item) => {
          if (!query) return true;
          return [item.code, item.name, item.note, ...(item.tags || [])].join(" ").toLowerCase().includes(query);
        })
        .sort(sortPoolItems);
    }

    function renderPoolOptions() {
      $("pool").innerHTML = POOLS.map((pool) => `<option value="${pool.id}">${pool.title}</option>`).join("");
    }

    function openForm(item) {
      $("formTitle").textContent = item ? "编辑标的" : "新增标的";
      $("stockId").value = item?.id || "";
      $("pool").value = item?.pool || state.activePool;
      $("code").value = item?.code || "";
      $("name").value = item?.name || "";
      $("grade").value = item?.grade || "";
      $("status").value = item?.status || "观察";
      $("price").value = item?.price || "";
      $("unitCost").value = item?.unitCost || "";
      $("tags").value = (item?.tags || []).join(", ");
      $("note").value = item?.note || "";
      $("drawer").classList.add("open");
      $("drawer").setAttribute("aria-hidden", "false");
      if (item?.symbol || item?.code) {
        updateFormQuote(item);
      }
      setTimeout(() => $("code").focus(), 50);
    }

    function closeForm() {
      $("drawer").classList.remove("open");
      $("drawer").setAttribute("aria-hidden", "true");
      $("stockForm").reset();
    }

    async function saveForm(event) {
      event.preventDefault();
      const id = $("stockId").value || uid();
      let item = {
        id,
        pool: $("pool").value,
        code: $("code").value.trim(),
        name: $("name").value.trim(),
        grade: $("grade").value.trim(),
        status: $("status").value,
        price: $("price").value.trim(),
        unitCost: $("unitCost").value.trim(),
        symbol: marketSymbol($("code").value.trim(), $("pool").value),
        tags: $("tags").value.split(/[,，]/).map((tag) => tag.trim()).filter(Boolean),
        note: $("note").value.trim()
      };

      item = await enrichItem(item);

      const index = state.items.findIndex((stock) => stock.id === id);
      if (index >= 0) {
        state.items[index] = item;
      } else {
        state.items.unshift(item);
      }
      state.activePool = item.pool;
      const synced = await persist();
      closeForm();
      render();
      refreshAllQuotes();
      showToast(synced ? "已同步到云端" : "已保存到本机，云端同步失败");
    }

    async function deleteItem(id) {
      const item = state.items.find((stock) => stock.id === id);
      if (!item) return;
      if (!confirm(`删除 ${item.name}？`)) return;
      state.items = state.items.filter((stock) => stock.id !== id);
      const synced = await persist();
      render();
      showToast(synced ? "已从云端删除" : "已本机删除，云端同步失败");
    }

    function scheduleSuggest(query) {
      clearTimeout(suggestTimer);
      state.suggestions = [];
      if (!query || query.length < 2) {
        closeSuggestions();
        return;
      }
      suggestTimer = setTimeout(() => searchMarket(query), 260);
    }

    async function searchMarket(query) {
      try {
        const globalName = `suggest_${Date.now()}_${Math.random().toString(36).slice(2)}`;
        const url = `${SINA_SUGGEST_URL}&key=${encodeURIComponent(query)}&name=${globalName}&_=${Date.now()}`;
        await loadScript(url, "gbk");
        const raw = window[globalName] || "";
        delete window[globalName];
        state.suggestions = await enrichSuggestions(parseSuggestions(raw)
          .filter((item) => item.code && item.symbol)
          .slice(0, 8));
        renderSuggestions();
      } catch {
        state.suggestions = [];
        closeSuggestions();
      }
    }

    function parseSuggestions(raw) {
      return String(raw)
        .split(";")
        .map((part) => part.trim())
        .filter(Boolean)
        .map((part) => {
          const fields = part.split(",");
          return {
            name: fields[0] || fields[6] || "",
            code: fields[2] || "",
            symbol: fields[3] || "",
            type: fields[1] || "",
            typeLabel: marketTypeLabel(fields[1], fields[3])
          };
        });
    }

    async function enrichSuggestions(suggestions) {
      const symbols = suggestions
        .filter((item) => shouldFixSuggestionName(item))
        .map((item) => item.symbol || marketSymbol(item.code, item.typeLabel === "ETF" ? "spec_etf" : "spec_stock"))
        .filter(Boolean);
      if (!symbols.length) return suggestions;
      const quotes = await fetchQuotes([...new Set(symbols)]).catch(() => ({}));
      return suggestions.map((item) => {
        const symbol = item.symbol || marketSymbol(item.code, item.typeLabel === "ETF" ? "spec_etf" : "spec_stock");
        const quote = quotes[symbol];
        return quote?.name ? { ...item, name: quote.name, symbol } : item;
      });
    }

    function shouldFixSuggestionName(item) {
      const name = String(item.name || "").trim();
      return !name || /^s[hz]\d{6}$/i.test(name) || name === item.code;
    }

    async function selectSuggestion(stock) {
      closeSuggestions();
      $("searchInput").value = "";
      state.query = "";
      const quote = await fetchQuote(stock.symbol);
      const pool = targetPoolForSuggestion(stock);
      const item = await enrichItem({
        id: uid(),
        pool,
        grade: "",
        code: stock.code,
        name: quote?.name || stock.name,
        symbol: stock.symbol,
        status: "观察",
        price: quote?.price || "",
        unitCost: quote?.unitCost || "",
        addedAt: new Date().toISOString(),
        entryAt: new Date().toISOString(),
        entryPrice: quote?.price || "",
        tags: inferTags({ ...stock, pool, name: quote?.name || stock.name, symbol: stock.symbol }),
        note: ""
      });

      const index = state.items.findIndex((stockItem) => stockItem.symbol === item.symbol || stockItem.code === item.code);
      if (index >= 0) {
        state.items[index] = { ...state.items[index], ...item, id: state.items[index].id };
      } else {
        state.items.unshift(item);
      }
      state.activePool = item.pool;
      state.activeStatus = "全部";
      const synced = await persist();
      render();
      refreshAllQuotes();
      showToast(synced ? `已添加 ${item.name}` : `已本机添加 ${item.name}，云端同步失败`);
    }

    async function updateFormQuote(item) {
      const symbol = item.symbol || marketSymbol(item.code, item.pool);
      if (!symbol) return;
      const quote = await fetchQuote(symbol);
      if (!quote) return;
      if (!$("stockId").value || $("code").value === item.code) {
        $("price").value = quote.price || $("price").value;
        $("unitCost").value = quote.unitCost || $("unitCost").value;
        if (!$("name").value && quote.name) $("name").value = quote.name;
        if (!$("tags").value) $("tags").value = inferTags({ ...item, name: quote.name, symbol }).join(", ");
        if (!$("note").value || $("note").value.includes("联网添加")) {
          $("note").value = buildDefaultNote({ ...item, name: quote.name, symbol, price: quote.price, changePct: quote.changePct });
        }
      }
    }

    function scheduleCodeAutofill() {
      clearTimeout(codeTimer);
      const code = $("code").value.trim();
      if (!/^\d{6}$/.test(code)) return;
      codeTimer = setTimeout(() => autofillByCode(), 360);
    }

    async function autofillByCode() {
      const code = $("code").value.trim();
      if (!/^\d{6}$/.test(code)) return;
      const pool = $("pool").value || state.activePool;
      const symbol = marketSymbol(code, pool);
      const quote = await fetchQuote(symbol);
      if (!quote) return;
      if (!$("name").value || /^s[hz]\d{6}$/i.test($("name").value.trim()) || $("name").value.trim() === code) {
        $("name").value = quote.name || $("name").value;
      }
      $("price").value = quote.price || $("price").value;
      $("unitCost").value = quote.unitCost || $("unitCost").value;
      if (!$("tags").value) $("tags").value = inferTags({ code, pool, symbol, name: quote.name }).join(", ");
      if (!$("note").value || $("note").value.includes("联网添加")) {
        $("note").value = buildDefaultNote({ code, pool, symbol, name: quote.name, price: quote.price, changePct: quote.changePct });
      }
    }

    async function enrichItem(item) {
      const symbol = item.symbol || marketSymbol(item.code, item.pool);
      const quote = symbol ? await fetchQuote(symbol).catch(() => null) : null;
      const checkpoint = currentReviewCheckpoint();
      const enriched = {
        ...item,
        symbol,
        name: item.name && !/^s[hz]\d{6}$/i.test(item.name) ? item.name : quote?.name || item.name || item.code,
        price: quote?.price || item.price,
        unitCost: quote?.unitCost || item.unitCost,
        changePct: quote?.changePct || item.changePct || "",
        quoteTime: quote?.time || item.quoteTime || "",
        amountWan: quote?.amountWan || item.amountWan || "",
        turnoverRate: quote?.turnoverRate || item.turnoverRate || ""
      };
      if (checkpoint && !enriched.conclusionSlot) {
        enriched.conclusionSlot = checkpoint.slot;
        enriched.conclusionLabel = checkpoint.label;
        enriched.conclusionUpdatedAt = new Date().toISOString();
      }
      if (!enriched.tags.length) enriched.tags = inferTags(enriched);
      if (!enriched.note || enriched.note.includes("联网添加")) {
        enriched.note = buildDefaultNote(enriched);
      }
      return enriched;
    }

    function inferTags(item) {
      const name = `${item.name || ""}${item.code || ""}`;
      const pool = item.pool || "";
      if (pool.includes("etf") || /ETF|基金/.test(name)) return ["ETF", "跟踪方向", "流动性"];
      if (/科技|芯片|半导体|电子|光环|长城|方正|TCL|京东方|省广/.test(name)) return ["科技", "成交额", "观察"];
      if (/隆基|光伏|新能源/.test(name)) return ["新能源", "反弹", "观察"];
      if (/联通|通信/.test(name)) return ["通信", "低波动", "观察"];
      return ["观察", "待验证", "小资金"];
    }

    function buildDefaultNote(item) {
      const name = item.name || item.code;
      const profile = stockProfile(item);
      const pulse = pricePulse(item);
      const active = activeTone(item);
      const review = reviewPrefix(item);
      if ((item.pool || "").includes("etf")) {
        return `${review}${name} 跟踪${profile.industry}方向，${active}；优先看成交额和跟踪方向是否延续，益盟只做主线回踩承接，不追单日情绪。`;
      }
      if ((item.pool || "").startsWith("long")) {
        return `${review}${name} 属于${profile.industry}，先按微淼框架核查盈利质量、现金流和估值位置；短线波动只作跟踪，不替代基本面判断。`;
      }
      if ((item.pool || "").startsWith("short")) {
        return `${review}${name} 属于${profile.industry}，${pulse}；重点看 5/10/20 日线承接和成交额延续，一到两周内不转强就降级。`;
      }
      return `${review}${name} 属于${profile.industry}，${pulse}；益盟看${profile.trigger}，微淼侧重先排除${profile.fundamentalRisk}。`;
    }

    function isAutoGeneratedNote(note) {
      const text = String(note || "");
      return !text || text.includes("联网添加") || text.includes("先放入") || text.includes("按小资金规则") || (text.includes("当前价") && text.includes("成交额"));
    }

    function stockProfile(item) {
      const text = `${item.name || ""}${(item.tags || []).join("")}${item.code || ""}`;
      if (/省广|广告|传媒|营销/.test(text)) {
        return { industry: "传媒营销/AI营销", trigger: "题材放量、低位大阳或平台突破后的回踩承接", fundamentalRisk: "主营利润波动和经营现金流硬伤" };
      }
      if (/百川|化工|新材料|锂|储能/.test(text)) {
        return { industry: "化工新材料", trigger: "放量止跌、回踩不破和趋势重新站回", fundamentalRisk: "周期品价格波动、负债和现金流压力" };
      }
      if (/华天|半导体|芯片|封测/.test(text)) {
        return { industry: "半导体封测", trigger: "主线成交额延续、回踩承接和均线共振", fundamentalRisk: "行业周期和利润率波动" };
      }
      if (/兆驰|显示|面板|消费电子|TCL|京东方/.test(text)) {
        return { industry: "显示/消费电子链", trigger: "低位放量、板块共振和回踩承接", fundamentalRisk: "价格周期和毛利率压力" };
      }
      if (/光环|算力|IDC|通信|联通/.test(text)) {
        return { industry: "算力通信/IDC", trigger: "主线资金回流、成交额放大和平台突破", fundamentalRisk: "资本开支、应收账款和现金流压力" };
      }
      if (/隆基|光伏|新能源/.test(text)) {
        return { industry: "光伏新能源", trigger: "超跌反弹后的放量确认和回踩不破", fundamentalRisk: "行业供需、库存和盈利修复不确定" };
      }
      if (/ETF|基金/.test(text) || (item.pool || "").includes("etf")) {
        return { industry: "板块/宽基", trigger: "方向强度、成交额和流动性", fundamentalRisk: "跟踪方向回撤" };
      }
      return { industry: "当前题材", trigger: "放量转强、低位大阳或回踩承接", fundamentalRisk: "财报质量和现金流硬伤" };
    }

    function pricePulse(item) {
      const pct = parseFloat(String(item.changePct || "").replace("%", ""));
      const turnover = Number(item.turnoverRate);
      if (!Number.isFinite(pct)) return "先按观察处理";
      if (pct >= 3) return "日内弹性较强，但追高风险同步抬升";
      if (pct > 0 && turnover >= 5) return "日内有资金活跃，重点看量能能否连续";
      if (pct > 0) return "走势偏强，仍需成交额继续配合";
      if (pct <= -2 && turnover >= 5) return "回落中仍有换手，先看承接是否稳定";
      if (pct <= -2) return "短线偏弱，先等止跌信号";
      return "波动不大，重点看回踩承接是否稳定";
    }

    function activeTone(item) {
      const amount = Number(item.amountWan);
      if (Number.isFinite(amount) && amount >= 100000) return "流动性很强";
      if (Number.isFinite(amount) && amount >= 30000) return "成交活跃";
      return "先看流动性是否够用";
    }

    function reviewPrefix(item) {
      const label = item.conclusionLabel || currentReviewLabel();
      return label ? `${label}：` : "";
    }

    function currentReviewCheckpoint(date = new Date()) {
      const hour = date.getHours();
      const minute = date.getMinutes();
      const day = `${date.getFullYear()}-${`${date.getMonth() + 1}`.padStart(2, "0")}-${`${date.getDate()}`.padStart(2, "0")}`;
      const minutes = hour * 60 + minute;
      if (minutes >= 15 * 60) return { slot: `${day}-close`, label: "收盘复盘" };
      if (minutes >= 11 * 60 + 30) return { slot: `${day}-noon`, label: "午间复盘" };
      return null;
    }

    function currentReviewLabel() {
      return currentReviewCheckpoint()?.label || "";
    }

    function shouldUpdateConclusion(item) {
      const checkpoint = currentReviewCheckpoint();
      if (!checkpoint) return false;
      return item.conclusionSlot !== checkpoint.slot;
    }

    async function refreshAllQuotes() {
      const symbols = [...new Set(state.items.map((item) => item.symbol || marketSymbol(item.code, item.pool)).filter(Boolean))];
      if (!symbols.length) return;
      try {
        const quotes = await fetchQuotes(symbols);
        let changed = false;
        let reviewChanged = false;
        const checkpoint = currentReviewCheckpoint();
        state.items = state.items.map((item) => {
          const symbol = item.symbol || marketSymbol(item.code, item.pool);
          const quote = quotes[symbol];
          if (!quote) return item;
          changed = true;
          const updated = {
            ...item,
            symbol,
            price: quote.price || item.price,
            unitCost: quote.unitCost || item.unitCost,
            changePct: quote.changePct || "",
            quoteTime: quote.time || "",
            amountWan: quote.amountWan || item.amountWan || "",
            turnoverRate: quote.turnoverRate || item.turnoverRate || ""
          };
          if (shouldUpdateConclusion(updated) || isAutoGeneratedNote(item.note)) {
            if (checkpoint) {
              updated.conclusionSlot = checkpoint.slot;
              updated.conclusionLabel = checkpoint.label;
              updated.conclusionUpdatedAt = new Date().toISOString();
            }
            updated.note = buildDefaultNote(updated);
            reviewChanged = true;
          }
          return {
            ...updated
          };
        });
        if (changed) {
          state.quoteUpdatedAt = new Date().toISOString();
          render();
        }
        if (reviewChanged) {
          await persist();
          showToast(checkpoint ? `${checkpoint.label}已更新` : "结论已更新");
        }
      } catch {
        showToast("行情刷新失败");
      }
    }

    async function fetchQuote(symbol) {
      const quotes = await fetchQuotes([symbol]);
      return quotes[symbol] || null;
    }

    async function fetchQuotes(symbols) {
      const cleanSymbols = symbols.filter(Boolean);
      if (!cleanSymbols.length) return {};
      await loadScript(`${TENCENT_QUOTE_URL}${cleanSymbols.join(",")}&_=${Date.now()}`, "gbk");
      const quotes = {};
      cleanSymbols.forEach((symbol) => {
        const raw = window[`v_${symbol}`];
        if (!raw) return;
        const quote = parseTencentQuote(raw);
        if (quote) quotes[symbol] = quote;
      });
      return quotes;
    }

    function parseTencentQuote(raw) {
      const fields = String(raw).split("~");
      if (fields.length < 33 || !fields[1]) return null;
      const price = Number(fields[3]);
      const pct = Number(fields[32]);
      const dateTime = fields[30] || "";
      return {
        name: fields[1],
        price: Number.isFinite(price) ? formatPrice(price) : "",
        unitCost: Number.isFinite(price) ? String(Math.round(price * 100)) : "",
        changePct: Number.isFinite(pct) ? `${pct >= 0 ? "+" : ""}${pct.toFixed(2)}%` : "",
        amountWan: Number.isFinite(Number(fields[37])) ? Number(fields[37]) : "",
        turnoverRate: Number.isFinite(Number(fields[38])) ? Number(fields[38]) : "",
        time: formatTencentTime(dateTime)
      };
    }

    function loadScript(url, charset) {
      return new Promise((resolve, reject) => {
        const script = document.createElement("script");
        script.src = url;
        script.async = true;
        if (charset) script.charset = charset;
        script.onload = () => {
          script.remove();
          resolve();
        };
        script.onerror = () => {
          script.remove();
          reject(new Error("script load failed"));
        };
        document.head.appendChild(script);
      });
    }

    function exportData() {
      const payload = {
        version: 1,
        exportedAt: new Date().toISOString(),
        pools: POOLS,
        items: state.items
      };
      const blob = new Blob([JSON.stringify(payload, null, 2)], { type: "application/json" });
      const url = URL.createObjectURL(blob);
      const link = document.createElement("a");
      link.href = url;
      link.download = `six-stock-pools-${new Date().toISOString().slice(0, 10)}.json`;
      link.click();
      URL.revokeObjectURL(url);
      showToast("已导出 JSON");
    }

    function importData(event) {
      const file = event.target.files[0];
      if (!file) return;
      const reader = new FileReader();
      reader.onload = async () => {
        try {
          const payload = JSON.parse(reader.result);
          const items = Array.isArray(payload) ? payload : payload.items;
          if (!Array.isArray(items)) throw new Error("invalid");
          state.items = items.map((item) => normalizeItem({ ...item, id: item.id || uid() }));
          const synced = await persist();
          render();
          refreshAllQuotes();
          showToast(synced ? "已导入并同步云端" : "已导入本机，云端同步失败");
        } catch {
          showToast("导入失败");
        } finally {
          fileInput.value = "";
        }
      };
      reader.readAsText(file);
    }

    async function resetData() {
      if (!confirm("恢复默认票仓？当前本地调整会被覆盖。")) return;
      state.items = cloneDefaultItems();
      state.activePool = "spec_stock";
      state.activeStatus = "全部";
      const synced = await persist();
      render();
      refreshAllQuotes();
      showToast(synced ? "已恢复默认并同步云端" : "已恢复本机默认，云端同步失败");
    }

    function loadItems() {
      try {
        const raw = localStorage.getItem(STORAGE_KEY);
        if (!raw) return cloneDefaultItems();
        const parsed = JSON.parse(raw);
        return Array.isArray(parsed.items) ? parsed.items.map(normalizeItem) : cloneDefaultItems();
      } catch {
        return cloneDefaultItems();
      }
    }

    async function loadCloudItems(options = {}) {
      if (!CLOUD_API_URL) return;
      state.cloudStatus = "syncing";
      updateSaveInfo();
      try {
        const response = await fetch(`${CLOUD_API_URL}?t=${Date.now()}`, {
          method: "GET",
          cache: "no-store"
        });
        if (!response.ok) throw new Error(`cloud read ${response.status}`);
        const payload = await response.json();
        if (Array.isArray(payload.items)) {
          state.items = mergeLocalEntryMeta(payload.items).map((item) => {
            const isUserAdded = !item.grade;
            return normalizeItem({
              ...item,
              id: item.id || uid(),
              entryAt: item.entryAt || item.addedAt || (isUserAdded ? payload.updatedAt || "" : ""),
              entryPrice: item.entryPrice || (isUserAdded ? item.price || "" : "")
            });
          });
          state.cloudSavedAt = payload.updatedAt || "";
          state.cloudStatus = "online";
          persistLocal(state.cloudSavedAt);
          render();
          return;
        }
        state.cloudStatus = "online";
        if (options.seedIfEmpty) await persist();
      } catch (error) {
        console.warn("cloud load failed", error);
        state.cloudStatus = "offline";
        showToast("云端读取失败，显示本机缓存");
      } finally {
        updateSaveInfo();
      }
    }

    async function persist() {
      const savedAt = new Date().toISOString();
      persistLocal(savedAt);
      if (!CLOUD_API_URL) return true;
      state.cloudStatus = "syncing";
      updateSaveInfo();
      try {
        const response = await fetch(CLOUD_API_URL, {
          method: "PUT",
          headers: { "Content-Type": "application/json" },
          body: JSON.stringify({ items: state.items })
        });
        if (!response.ok) throw new Error(`cloud save ${response.status}`);
        const payload = await response.json();
        state.cloudSavedAt = payload.updatedAt || savedAt;
        state.cloudStatus = "online";
        persistLocal(state.cloudSavedAt);
        return true;
      } catch (error) {
        console.warn("cloud save failed", error);
        state.cloudStatus = "offline";
        return false;
      } finally {
        updateSaveInfo();
      }
    }

    function persistLocal(savedAt = new Date().toISOString()) {
      localStorage.setItem(STORAGE_KEY, JSON.stringify({
        savedAt,
        items: state.items
      }));
    }

    function updateSaveInfo() {
      let savedAt = "";
      try {
        savedAt = JSON.parse(localStorage.getItem(STORAGE_KEY) || "{}").savedAt;
      } catch {}
      const quoteText = state.quoteUpdatedAt ? `已刷新 ${formatDate(state.quoteUpdatedAt).slice(6)}` : "";
      const cloudTime = state.cloudSavedAt || savedAt;
      const statusText = {
        loading: "读取云端",
        syncing: "云端同步中",
        online: cloudTime ? `云端已同步 ${formatDate(cloudTime)}` : "云端已连接",
        offline: savedAt ? `本机缓存 ${formatDate(savedAt)}` : "本机缓存"
      }[state.cloudStatus] || "云端同步";
      const saveText = statusText;
      $("saveInfo").textContent = quoteText ? `${quoteText} · ${saveText}` : saveText;
    }

    function cloneDefaultItems() {
      return DEFAULT_ITEMS.map((item) => normalizeItem({ ...item, id: uid(), tags: [...(item.tags || [])] }));
    }

    function normalizeItem(item) {
      const shouldBackfillEntry = item.entryAt || item.addedAt || !item.grade;
      const entryPrice = item.entryPrice || (shouldBackfillEntry ? item.price || "" : "");
      const entryAt = item.entryAt || item.addedAt || "";
      return {
        ...item,
        symbol: item.symbol || marketSymbol(item.code, item.pool),
        addedAt: item.addedAt || "",
        entryAt,
        entryPrice,
        conclusionSlot: item.conclusionSlot || "",
        conclusionLabel: item.conclusionLabel || "",
        conclusionUpdatedAt: item.conclusionUpdatedAt || "",
        amountWan: item.amountWan || "",
        turnoverRate: item.turnoverRate || "",
        tags: Array.isArray(item.tags) ? item.tags : String(item.tags || "").split(/[,，]/).map((tag) => tag.trim()).filter(Boolean)
      };
    }

    function mergeLocalEntryMeta(items) {
      const localItems = loadLocalPayload().items || [];
      return items.map((item) => {
        const local = localItems.find((saved) => saved.id === item.id || saved.symbol === item.symbol || saved.code === item.code);
        return local ? {
          ...item,
          entryAt: item.entryAt || local.entryAt || local.addedAt || "",
          entryPrice: item.entryPrice || local.entryPrice || "",
          addedAt: item.addedAt || local.addedAt || "",
          conclusionSlot: item.conclusionSlot || local.conclusionSlot || "",
          conclusionLabel: item.conclusionLabel || local.conclusionLabel || "",
          conclusionUpdatedAt: item.conclusionUpdatedAt || local.conclusionUpdatedAt || ""
        } : item;
      });
    }

    function loadLocalPayload() {
      try {
        return JSON.parse(localStorage.getItem(STORAGE_KEY) || "{}");
      } catch {
        return {};
      }
    }

    function targetPoolForSuggestion(stock) {
      const isEtf = stock.symbol?.startsWith("sh5") || stock.symbol?.startsWith("sz15") || stock.typeLabel === "ETF";
      const activePool = getPool(state.activePool);
      if (activePool && activePool.type === (isEtf ? "ETF" : "个股")) return activePool.id;
      return isEtf ? "spec_etf" : "spec_stock";
    }

    function getPool(id) {
      return POOLS.find((pool) => pool.id === id) || POOLS[0];
    }

    function uid() {
      return `s_${Math.random().toString(36).slice(2)}_${Date.now().toString(36)}`;
    }

    function statusRank(status) {
      return { "可操作": 1, "观察": 2, "待筛选": 3, "暂不进入": 4 }[status] || 5;
    }

    function sortPoolItems(a, b) {
      const aAdded = Date.parse(a.addedAt || "");
      const bAdded = Date.parse(b.addedAt || "");
      const aIsAdded = Number.isFinite(aAdded);
      const bIsAdded = Number.isFinite(bAdded);
      if (aIsAdded || bIsAdded) {
        if (!aIsAdded) return 1;
        if (!bIsAdded) return -1;
        return bAdded - aAdded;
      }
      return 0;
    }

    function entrySummary(item) {
      const entryPrice = Number(item.entryPrice);
      const currentPrice = Number(item.price);
      if (!Number.isFinite(entryPrice) || entryPrice <= 0 || !Number.isFinite(currentPrice)) {
        return null;
      }
      const change = currentPrice - entryPrice;
      const pct = (change / entryPrice) * 100;
      const sign = pct > 0 ? "+" : "";
      const tone = pct > 0 ? "entry-up" : pct < 0 ? "entry-down" : "";
      const time = item.entryAt ? formatDate(item.entryAt) : "待补";
      return {
        tone,
        text: `入仓 ${time} · ${formatPrice(entryPrice)} → ${formatPrice(currentPrice)} · ${sign}${pct.toFixed(2)}%`
      };
    }

    function marketSymbol(code, pool) {
      const value = String(code || "").trim().toLowerCase();
      if (!value) return "";
      if (/^(sh|sz)\d{6}$/.test(value)) return value;
      const digits = value.replace(/\D/g, "").slice(0, 6);
      if (!digits) return "";
      if (digits.startsWith("6") || digits.startsWith("5")) return `sh${digits}`;
      if (digits.startsWith("0") || digits.startsWith("1") || digits.startsWith("2") || digits.startsWith("3")) return `sz${digits}`;
      return pool && pool.includes("etf") ? `sh${digits}` : `sz${digits}`;
    }

    function marketTypeLabel(type, symbol) {
      if (symbol?.startsWith("sh5") || symbol?.startsWith("sz15")) return "ETF";
      return type === "11" ? "A股" : "标的";
    }

    function displayUnitCost(item) {
      if (item.unitCost) return item.unitCost;
      const price = Number(item.price);
      return Number.isFinite(price) ? String(Math.round(price * 100)) : "";
    }

    function quoteTone(item) {
      const pct = parseFloat(String(item.changePct || "").replace("%", ""));
      if (!Number.isFinite(pct) || pct === 0) return "quote-flat";
      return pct > 0 ? "quote-up" : "quote-down";
    }

    function quoteBg(item) {
      const tone = quoteTone(item);
      if (tone === "quote-up") return "quote-up-bg";
      if (tone === "quote-down") return "quote-down-bg";
      return "quote-flat-bg";
    }

    function displayCode(item) {
      const symbol = item.symbol || marketSymbol(item.code, item.pool);
      if (/^(sh|sz)\d{6}$/.test(symbol)) return symbol.toUpperCase();
      return item.code || "";
    }

    function marketQuoteUrl(item) {
      const symbol = item.symbol || marketSymbol(item.code, item.pool);
      if (/^(sh|sz)\d{6}$/.test(symbol)) {
        return `https://xueqiu.com/S/${symbol.toUpperCase()}`;
      }
      const fallback = encodeURIComponent(item.name || item.code || "");
      return `https://xueqiu.com/k?q=${fallback}`;
    }

    function marketBadge(symbol) {
      const value = String(symbol || "").toLowerCase();
      if (value.startsWith("sh")) return `<span class="market-badge">沪</span>`;
      if (value.startsWith("sz")) return `<span class="market-badge">深</span>`;
      return `<span class="market-badge">票</span>`;
    }

    function sparkline(item) {
      const tone = quoteTone(item);
      const pct = parseFloat(String(item.changePct || "0").replace("%", ""));
      const down = tone === "quote-down";
      const up = tone === "quote-up";
      const seed = String(item.code || item.name || "").split("").reduce((sum, char) => sum + char.charCodeAt(0), 0);
      const points = [];
      for (let index = 0; index < 9; index += 1) {
        const wave = Math.sin((seed + index * 7) / 5) * 4;
        const drift = down ? index * 2.3 : up ? -index * 1.8 : Math.sin(index) * 1.2;
        const shock = Number.isFinite(pct) ? Math.min(6, Math.abs(pct)) * (index / 10) * (down ? 1 : -1) : 0;
        const y = Math.max(5, Math.min(29, 14 + wave + drift + shock));
        points.push([index * 8, y]);
      }
      const line = points.map((point) => point.join(",")).join(" ");
      const area = `0,34 ${line} 64,34`;
      return `
        <svg viewBox="0 0 64 34" preserveAspectRatio="none">
          <path class="area" d="M ${area} Z" fill="currentColor"></path>
          <polyline points="${line}" stroke="currentColor" fill="none"></polyline>
        </svg>
      `;
    }

    function latestQuoteTime(items) {
      return items.map((item) => item.quoteTime).filter(Boolean).sort().pop() || "";
    }

    function formatMoney(value) {
      if (value === "" || value == null) return "-";
      const number = Number(value);
      if (!Number.isFinite(number)) return escapeHtml(String(value));
      return number >= 10000 ? `${Math.round(number / 100) / 100}万` : `${Math.round(number)}`;
    }

    function formatAmountWan(value) {
      const number = Number(value);
      if (!Number.isFinite(number)) return "";
      if (number >= 10000) return `${(number / 10000).toFixed(2)}亿`;
      return `${Math.round(number)}万`;
    }

    function formatPrice(value) {
      if (!Number.isFinite(value)) return "";
      return value.toFixed(2);
    }

    function formatTencentTime(value) {
      const text = String(value || "");
      if (!/^\d{14}$/.test(text)) return "";
      return `${text.slice(0, 4)}-${text.slice(4, 6)}-${text.slice(6, 8)} ${text.slice(8, 10)}:${text.slice(10, 12)}:${text.slice(12, 14)}`;
    }

    function formatDate(iso) {
      const date = new Date(iso);
      if (Number.isNaN(date.getTime())) return "";
      const month = `${date.getMonth() + 1}`.padStart(2, "0");
      const day = `${date.getDate()}`.padStart(2, "0");
      const hour = `${date.getHours()}`.padStart(2, "0");
      const minute = `${date.getMinutes()}`.padStart(2, "0");
      return `${month}-${day} ${hour}:${minute}`;
    }

    function escapeHtml(value) {
      return String(value)
        .replace(/&/g, "&amp;")
        .replace(/</g, "&lt;")
        .replace(/>/g, "&gt;")
        .replace(/"/g, "&quot;")
        .replace(/'/g, "&#039;");
    }

    function showToast(message) {
      const toast = $("toast");
      toast.textContent = message;
      toast.classList.add("show");
      clearTimeout(showToast.timer);
      showToast.timer = setTimeout(() => toast.classList.remove("show"), 1800);
    }
  </script>
</body>
</html>
